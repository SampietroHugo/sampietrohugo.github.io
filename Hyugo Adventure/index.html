<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéJourney</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="img/structure/icon/master-ball.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="games container">

        <h2>Main Games</h2>

        <div class="game-carousel">
            <button type="button" class="carousel-btn prev" aria-label="Anterior">◄</button>

            <div class="carousel-fade fade-left"></div>
            <div class="carousel-fade fade-right"></div>

            <div class="carousel-track">
                <a href="pages/official-games/red.html" class="carousel-item-card"><img src="img/game-box/red.avif"><span>Red</span></a>
                <a href="pages/official-games/sapphire.html" class="carousel-item-card"><img src="img/game-box/sapphire.avif"><span>Sapphire</span></a>
                <a href="pages/official-games/fire-red.html" class="carousel-item-card"><img src="img/game-box/fire-red.avif"><span>Fire Red</span></a>
                <a href="pages/official-games/leaf-green.html" class="carousel-item-card"><img src="img/game-box/leaf-green.avif"><span>Leaf
                        Green</span></a>
                <a href="pages/official-games/emerald.html" class="carousel-item-card"><img src="img/game-box/emerald.avif"><span>Emerald</span></a>
            </div>

            <button type="button" class="carousel-btn next" aria-label="Próximo">►</button>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/carousel.js"></script>
    <script src="js/partials.js"></script>

</body>

</html>
